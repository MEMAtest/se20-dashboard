<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2550"/>
      <stop offset="0.55" stop-color="#111936"/>
      <stop offset="1" stop-color="#0a0f24"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#3f6dff" stop-opacity="0.38"/>
      <stop offset="0.5" stop-color="#3f6dff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#3f6dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="route" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#34d27b"/>
      <stop offset="0.45" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#9db8ff"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7da2ff"/>
      <stop offset="1" stop-color="#2f6bff"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow)"/>

  <!-- Faint map grid -->
  <g stroke="#aab8e8" stroke-opacity="0.07" stroke-width="3">
    <path d="M96 0 V512 M256 0 V512 M416 0 V512"/>
    <path d="M0 128 H512 M0 288 H512 M0 432 H512"/>
  </g>

  <!-- Route glow underlay -->
  <path d="M140 392 C 200 392 188 240 268 218 C 330 200 322 158 354 138"
        fill="none" stroke="#4a7dff" stroke-opacity="0.55" stroke-width="40"
        stroke-linecap="round" filter="url(#soft)"/>

  <!-- Route line -->
  <path d="M140 392 C 200 392 188 240 268 218 C 330 200 322 158 354 138"
        fill="none" stroke="url(#route)" stroke-width="26" stroke-linecap="round"/>

  <!-- Intermediate stop -->
  <circle cx="268" cy="218" r="15" fill="#0e1530" stroke="#cdd9ff" stroke-width="8"/>

  <!-- Origin dot -->
  <circle cx="140" cy="392" r="26" fill="#0e1530" stroke="#34d27b" stroke-width="12"/>

  <!-- Destination pin -->
  <g>
    <ellipse cx="354" cy="206" rx="34" ry="10" fill="#000" opacity="0.30"/>
    <path d="M354 76 c -38 0 -64 27 -64 60 c 0 44 50 60 64 96 c 14 -36 64 -52 64 -96 c 0 -33 -26 -60 -64 -60 z"
          fill="url(#pin)" stroke="#dfe8ff" stroke-width="7"/>
    <circle cx="354" cy="134" r="20" fill="#0e1530"/>
  </g>

  <!-- Top sheen -->
  <path d="M0 116 a116 116 0 0 1 116 -116 h280 a116 116 0 0 1 116 116 v92 q-256 84 -512 0 z" fill="url(#sheen)"/>
</svg>
