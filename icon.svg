  <rect x="242" y="182" width="28" height="15" rx="3" fill="#87CEEB"/>
  <circle cx="246" cy="215" r="5" fill="#333"/>
  <circle cx="266" cy="215" r="5" fill="#333"/>

  <!-- SE20 text -->
